<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Benny金庫">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Noto+Sans+TC:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --brown:#5C4636; --bg:#FAF5ED; --green-bg:#E2F0D9; --red-bg:#FCE4D6; }
body {
  font-family:'Architects Daughter','Noto Sans TC',sans-serif;
  background:#F0E8D8;
  min-height:100vh;
  display:flex; justify-content:center; align-items:flex-start;
  padding:12px 0 40px;
}
/* 圓體數字專用 */
.num { font-family:'Nunito','Noto Sans TC',sans-serif; font-weight:900; }

.app {
  width:100%; max-width:420px;
  background:var(--bg);
  border:4px solid var(--brown);
  border-radius:32px;
  box-shadow:7px 7px 0 var(--brown);
  overflow:hidden;
  margin:0 12px;
}

/* HEADER */
.header { background:#E53935; border-bottom:4px solid var(--brown); padding:16px 16px 0; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(255,255,255,0.04) 12px,rgba(255,255,255,0.04) 13px); }
.car-fleet { display:flex; justify-content:space-around; align-items:center; padding:4px 8px 10px; position:relative; z-index:1; }
.car-fleet span { font-size:32px; transition:all 0.5s ease; line-height:1; }
.car-locked { filter:grayscale(100%) opacity(25%); }
.car-unlocked { filter:none; }
@keyframes carPop { 0%{transform:scale(0.7)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
.header-title { font-size:22px; color:#fff; text-align:center; font-weight:900; text-shadow:3px 3px 0 rgba(0,0,0,0.2); line-height:1.2; position:relative; z-index:1; padding-bottom:4px; }
.road { background:#546E7A; height:46px; position:relative; overflow:hidden; display:flex; align-items:center; }
.road-lines { display:flex; gap:16px; padding-left:8px; align-items:center; flex-shrink:0; }
.road-line { width:28px; height:5px; background:#FFF176; border-radius:3px; flex-shrink:0; }
.road-car { position:absolute; right:10px; bottom:2px; font-size:28px; transition:all 0.4s; }

/* SYNC STATUS */
.sync-bar { background:#EDE0CE; border-bottom:2px solid var(--brown); padding:6px 14px; display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:700; color:#8A7360; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:#aaa; display:inline-block; margin-right:5px; }
.sync-dot.ok { background:#4CAF50; }
.sync-dot.syncing { background:#FF9800; }
.sync-dot.err { background:#F44336; }

/* TABS */
.tabs { display:flex; gap:8px; padding:10px 12px; background:#EDE0CE; border-bottom:3px solid var(--brown); position:sticky; top:0; z-index:10; }
.tab-btn { flex:1; padding:11px 8px; border-radius:16px; font-family:inherit; font-size:14px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.15s; border:3px solid transparent; }
.tab-btn:active { transform:translate(2px,2px); }
.tab-active-tasks { background:#FFDFD3; color:#703A2E; border-color:var(--brown); box-shadow:3px 3px 0 var(--brown); }
.tab-active-wallet { background:#D2EBD4; color:#2F4F1A; border-color:var(--brown); box-shadow:3px 3px 0 var(--brown); }
.tab-inactive { background:transparent; color:#9E8A78; border-color:transparent; }
.tab-active-cal { background:#D1ECF1; color:#0C3547; border-color:var(--brown); box-shadow:3px 3px 0 var(--brown); }

/* CONTENT */
.content { padding:14px 12px; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* REPORT CARD */
.report-card { background:#FCF4DF; border:3px solid var(--brown); border-radius:18px; padding:14px; box-shadow:4px 4px 0 var(--brown); display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
.report-label { font-size:12px; font-weight:900; color:#856404; display:flex; align-items:center; gap:4px; }
.report-hint { font-size:10px; color:#9E7D2B; margin-top:3px; font-weight:700; }
.report-btn { background:#FFF0CD; color:#634A15; border:2.5px solid var(--brown); border-radius:14px; padding:10px 14px; font-family:inherit; font-size:12px; font-weight:900; cursor:pointer; box-shadow:2px 2px 0 var(--brown); flex-shrink:0; transition:all 0.1s; }
.report-btn:active { transform:translate(2px,2px); box-shadow:none; }

/* SECTION TITLE */
.section-title { font-size:15px; font-weight:900; color:var(--brown); display:flex; align-items:center; gap:6px; margin-bottom:10px; }

/* TASK CARD */
.task-card { background:white; border:3px solid var(--brown); border-radius:18px; padding:14px; box-shadow:4px 4px 0 var(--brown); margin-bottom:12px; }
.task-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.task-tag { font-size:12px; font-weight:900; padding:3px 10px; border-radius:10px; border:2px solid; display:inline-flex; align-items:center; gap:4px; }
.task-reward { font-size:12px; font-weight:900; color:#ED7D31; background:#FFF0EE; border:2px dashed #ED7D31; border-radius:20px; padding:2px 10px; flex-shrink:0; }
.task-desc { font-size:11px; color:#9E8A78; margin-bottom:10px; font-weight:700; }
.day-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.day-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5px 2px; border-radius:10px; border:2px solid #E2DDD5; background:white; cursor:pointer; font-family:inherit; font-weight:900; font-size:11px; color:#9E8A78; transition:all 0.12s; min-height:44px; }
.day-btn:active { transform:scale(0.9); }

const roadCars = ['🚒','🚓','🚑','🚛','🚜'];
let roadCarIdx = 0;
const roadLinesEl = document.getElementById('roadLines');

  const d = document.createElement('div'); d.className = 'road-line';

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── SYNC STATUS ──────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

// ─── STORAGE (Firebase Realtime Database compat) ─────────────────────────────
async function cloudGet(key) {
  try {
    const snap = await db.ref(`${DB_PATH}/${key}`).get();
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.error('cloudGet err', e); return null; }
}
async function cloudSet(key, val) {
  try {
    await db.ref(`${DB_PATH}/${key}`).set(val);
  } catch(e) { console.error('cloudSet err', e); }
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const daysLabel = ['一','二','三','四','五','六','日'];
const taskDefs = [
  { id:1, emoji:'🚒', title:'JOJO 閱讀',    desc:'每週六前，主動且認真完成進度',  reward:10, threshold:3, textColor:'#7F6000', borderColor:'#D6B23C' },
  { id:2, emoji:'🚓', title:'JOJO 數學',    desc:'每週六前，主動且認真完成進度',  reward:10, threshold:3, textColor:'#385723', borderColor:'#70AD47' },
  { id:3, emoji:'📝', title:'挑戰考卷',     desc:'一週完成三張考卷（內容不限）',  reward:10, threshold:3, textColor:'#843C0C', borderColor:'#ED7D31' },
  { id:4, emoji:'⏰', title:'帥氣起床',     desc:'一週不賴床5次，且不用爸媽叫',  reward:20, threshold:5, textColor:'#7F6000', borderColor:'#D6B23C' },
  { id:5, emoji:'🧼', title:'主動刷牙洗臉', desc:'一週7天，早晚都主動去盥洗',    reward:20, threshold:5, textColor:'#0C5460', borderColor:'#17A2B8' },
];

let tasks   = taskDefs.map(t=>({...t, days:[false,false,false,false,false,false,false]}));
let monthly = false;
let txs     = [];
let goal    = { name:'買新玩具車車', target:300 };
let saving  = false;

// ─── LOAD ALL FROM CLOUD ──────────────────────────────────────────────────────
async function loadAll() {
  setSyncStatus('syncing','資料同步中…');
  try {
    const [t, m, tx, g, ce] = await Promise.all([
      cloudGet('tasks'), cloudGet('monthly'), cloudGet('txs'), cloudGet('goal'), cloudGet('calEvents')
    ]);
    if (t)  tasks     = t;
    if (m !== null) monthly = m;
    if (tx) txs       = tx;
    if (g)  goal      = g;
    if (ce) calEvents = ce;
    setSyncStatus('ok','已同步 ✓');
  } catch {
    setSyncStatus('err','離線模式');
  }
  document.getElementById('goal-name').value   = goal.name;
  document.getElementById('goal-target').value = goal.target;
  renderTasks(); renderMonthly(); renderWallet(); renderCal();
}

// ─── SAVE helpers ─────────────────────────────────────────────────────────────
async function saveTasks()   { setSyncStatus('syncing','儲存中…'); await cloudSet('tasks',tasks);   setSyncStatus('ok','已同步 ✓'); }
async function saveMonthly() { setSyncStatus('syncing','儲存中…'); await cloudSet('monthly',monthly);setSyncStatus('ok','已同步 ✓'); }
async function saveTxs()     { setSyncStatus('syncing','儲存中…'); await cloudSet('txs',txs);       setSyncStatus('ok','已同步 ✓'); }
async function saveGoalData(){ setSyncStatus('syncing','儲存中…'); await cloudSet('goal',goal);     setSyncStatus('ok','已同步 ✓'); }

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['tasks','wallet','cal'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', tab===id);
  });
  const bT=document.getElementById('btn-tasks'), bW=document.getElementById('btn-wallet'), bC=document.getElementById('btn-cal');
  bT.className='tab-btn tab-inactive'; bW.className='tab-btn tab-inactive'; bC.className='tab-btn tab-inactive';
  if (tab==='tasks')  { bT.className='tab-btn tab-active-tasks'; }
  if (tab==='wallet') { bW.className='tab-btn tab-active-wallet'; renderWallet(); }
  if (tab==='cal')    { bC.className='tab-btn tab-active-cal'; renderCal(); }
}

// ─── RENDER TASKS ─────────────────────────────────────────────────────────────
function renderTasks() {
  const c = document.getElementById('weekly-tasks-container');
  c.innerHTML = '';
  tasks.forEach(task => {
    const doneCount = task.days.filter(Boolean).length;
    const daysHtml  = task.days.map((checked, idx) => `
      <button class="day-btn${checked?' checked':''}" onclick="toggleDay(${task.id},${idx})">
        <span>${daysLabel[idx]}</span>
        <div class="day-dot">${checked?'✓':''}</div>
      </button>`).join('');
    c.innerHTML += `
      <div class="task-card">
        <div class="task-header">
          <span class="task-tag" style="color:${task.textColor};border-color:${task.borderColor}">${task.emoji} ${task.title}</span>
          <span class="task-reward">💰 <span class="num">$${task.reward}</span>元</span>
        </div>
        <div class="task-desc">${task.desc}（已完成 <span class="num">${doneCount}/${task.threshold}</span> 天）</div>
        <div class="day-grid">${daysHtml}</div>
      </div>`;
  });
}

async function toggleDay(taskId, dayIdx) {
  tasks = tasks.map(t => {
    if (t.id !== taskId) return t;
    const days = [...t.days]; days[dayIdx] = !days[dayIdx];
    return {...t, days};
  });
  renderTasks();
  await saveTasks();
}

// ─── MONTHLY ──────────────────────────────────────────────────────────────────
async function toggleMonthly() {
  monthly = !monthly;
  renderMonthly();
  await saveMonthly();
}
function renderMonthly() {
  document.getElementById('monthly-card').classList.toggle('done', monthly);
  const ch = document.getElementById('monthly-check');
  ch.classList.toggle('done', monthly);
  ch.textContent = monthly ? '✓' : '';
}

// ─── WALLET ───────────────────────────────────────────────────────────────────
function getBalance() { return txs.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0); }

function renderWallet() {
  const balance = getBalance();
  const income  = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  document.getElementById('balance-display').textContent = balance.toLocaleString();
  document.getElementById('total-income').textContent    = '$'+income.toLocaleString();
  document.getElementById('total-expense').textContent   = '$'+expense.toLocaleString();

  const gTarget = parseInt(document.getElementById('goal-target').value)||300;
  const pct     = Math.min(100, Math.max(0, balance/gTarget*100));
  document.getElementById('progress-bar').style.width = pct+'%';
  const gName = document.getElementById('goal-name').value || '目標';
  const diff  = gTarget - balance;
  const statusEl = document.getElementById('goal-status');
  if (diff <= 0) {
    statusEl.textContent  = `🎉 太讚了！你存夠錢買【${gName}】囉！🎁`;
    statusEl.style.color  = '#2E7D32'; statusEl.style.fontWeight = '900';
  } else {
    statusEl.textContent  = `還差 $${diff} 元就能買【${gName}】！加油！💪`;
    statusEl.style.color  = '#555'; statusEl.style.fontWeight = '700';
  }

  // cars unlock
  [100,200,300].forEach((thr,i) => {
    const el = document.getElementById('car'+(i+1));
    const wasLocked = el.classList.contains('car-locked');
    el.classList.toggle('car-locked',   balance < thr);
    el.classList.toggle('car-unlocked', balance >= thr);
    if (wasLocked && balance >= thr) showToast('🎉 解鎖新車車啦！');
  });

  // tx list
  const list = document.getElementById('tx-list');
  if (!txs.length) {
    list.innerHTML = '<div class="tx-empty">🚒<br>還沒有記錄喔！<br>快來記第一筆帳吧！</div>';
    return;
  }
  list.innerHTML = txs.map(tx => `
    <div class="tx-item" style="border-left:5px solid ${tx.type==='income'?'#66BB6A':'#EF5350'}">
      <div class="tx-icon">${tx.emoji}</div>
      <div class="tx-info">
        <div class="tx-note">${tx.note}</div>
        <div class="tx-date num">${tx.date}</div>
      </div>
      <div class="tx-amount ${tx.type}">${tx.type==='income'?'+':'-'}$<span class="num">${tx.amount.toLocaleString()}</span></div>
      <button class="tx-del" onclick="deleteTx(${tx.id})">🗑️</button>
    </div>`).join('');
}

async function saveGoal() {
  goal = { name: document.getElementById('goal-name').value, target: parseInt(document.getElementById('goal-target').value)||300 };
  renderWallet();
  await saveGoalData();
}

async function addTx(type) {
  const dateEl = document.getElementById('tx-date');
  const amtEl  = document.getElementById('tx-amount');
  const noteEl = document.getElementById('tx-note');
  const date   = dateEl.value;
  const amount = parseFloat(amtEl.value);
  const note   = noteEl.value.trim();
  if (!date)          { showToast('⚠️ 請填日期！'); return; }
  if (!amount||amount<=0) { showToast('⚠️ 請輸入大於0的金額！'); return; }
  if (!note)          { showToast('⚠️ 請寫下一點點明細！'); return; }
  const emojiMatch = note.match(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);
  const emoji = emojiMatch ? emojiMatch[0] : (type==='income'?'💰':'🧸');
  txs.unshift({ id:Date.now(), type, date, amount, note, emoji });
  amtEl.value=''; noteEl.value='';
  renderWallet();
  await saveTxs();
  showToast(type==='income'?`💰 存入 $${amount} 元！`:`💸 記錄支出 $${amount} 元！`);
}

async function deleteTx(id) {
  if (!confirm('確定要刪掉這筆記錄嗎？')) return;
  txs = txs.filter(t=>t.id!==id);
  renderWallet();
  await saveTxs();
  showToast('🗑️ 已刪除這筆記帳！');
}

// ─── REPORT ───────────────────────────────────────────────────────────────────
function copyReport() {
  let reward = 0;
  let text = `✨【本週自主能力挑戰成果結算】✨\n`;
  text += `📅 結算日期：${new Date().toLocaleDateString('zh-TW')}\n`;
  text += `───────────────────\n`;
  tasks.forEach(t => {
    const done = t.days.filter(Boolean).length;
    const pass = done >= t.threshold;
    if (pass) reward += t.reward;
    text += `${pass?'✅':'❌'} ${t.title}：完成${done}天（${pass?'達成！':'加油！'}）\n`;
  });
  if (monthly) { text += `👑 月大魔王：成功！(+$30元)\n`; reward+=30; }
  else           text += `🌙 月大魔王：繼續加油！\n`;
  text += `───────────────────\n`;
  text += `💰 本週共獲得：$${reward} 元！\n`;
  text += `🚒 爸爸媽媽請幫我存入小金庫！謝謝！🚓`;
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast('📋 成果已複製！貼到LINE給爸媽吧！'));
  } else {
    const ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 成果已複製！貼到LINE給爸媽吧！');
  }
}


// ─── CALENDAR ─────────────────────────────────────────────────────────────────
const MONTHS_ZH = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let calEvents = {}; // { 'YYYY-MM-DD': [{id, text}] }
let calYear, calMonth; // currently viewed
let selectedDate = null;

function calInit() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth(); // 0-indexed
}

function renderCal() {
  const now   = new Date();
  const todayStr = now.toISOString().split('T')[0];
  document.getElementById('cal-month-label').textContent = MONTHS_ZH[calMonth];
  document.getElementById('cal-year-label').textContent  = calYear + '年';

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day-of-week headers (Mon first)
  const dowLabels = ['一','二','三','四','五','六','日'];
  dowLabels.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i>=5?' weekend':'');
    el.textContent = d;
    grid.appendChild(el);
  });

  // first day of month (Mon=0)
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  for (let i = 0; i < startOffset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOfWeek = new Date(calYear, calMonth, d).getDay(); // 0=Sun,6=Sat
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isToday   = dateStr === todayStr;
    const events    = calEvents[dateStr] || [];

    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (isToday)   cls += ' today';
    if (events.length) cls += ' has-event';
    if (isWeekend) cls += ' weekend-cell';
    cell.className = cls;
    cell.onclick = () => openModal(dateStr);

    const numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    if (events.length) {
      const dotRow = document.createElement('div');
      dotRow.className = 'cal-dot-row';
      events.slice(0,3).forEach(() => {
        const dot = document.createElement('div'); dot.className='cal-dot';
        dotRow.appendChild(dot);
      });
      cell.appendChild(dotRow);
    }

    grid.appendChild(cell);
  }
  renderMonthlyEvents();
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

// ─── EVENT MODAL ──────────────────────────────────────────────────────────────
function openModal(dateStr) {
  selectedDate = dateStr;
  const [y,m,d] = dateStr.split('-');
  document.getElementById('modal-date-label').textContent = `📅 ${parseInt(m)}月${parseInt(d)}日`;
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('event-input').value = '';
  renderEventList();
  setTimeout(() => document.getElementById('event-input').focus(), 300);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
  selectedDate = null;
}

function renderEventList() {
  const list = document.getElementById('event-list');
  const events = calEvents[selectedDate] || [];
  if (!events.length) {
    list.innerHTML = '<div class="event-empty">🚒 今天還沒有計畫，快加一個！</div>';
    return;
  }
  const eventEmojis = ['🚒','🚓','🚑','📚','✏️','🎨','🏃','🍎','🌟','🎮'];
  list.innerHTML = events.map((ev, i) => `
    <div class="event-item">
      <div class="event-emoji">${eventEmojis[i % eventEmojis.length]}</div>
      <div class="event-text">${ev.text}</div>
      <button class="event-del" onclick="deleteEvent('${ev.id}')">🗑️</button>
    </div>`).join('');
}

async function addEvent() {
  const input = document.getElementById('event-input');
  const text  = input.value.trim();
  if (!text) { showToast('⚠️ 請輸入待辦事項！'); return; }
  if (!calEvents[selectedDate]) calEvents[selectedDate] = [];
  calEvents[selectedDate].push({ id: Date.now().toString(), text });
  input.value = '';
  renderEventList();
  renderCal();
  await saveCalEvents();
  showToast('✅ 加入行事曆！');
}

async function deleteEvent(evId) {
  if (!selectedDate) return;
  calEvents[selectedDate] = (calEvents[selectedDate]||[]).filter(e=>e.id!==evId);
  if (!calEvents[selectedDate].length) delete calEvents[selectedDate];
  renderEventList();
  renderCal();
  await saveCalEvents();
}

async function saveCalEvents() {
  setSyncStatus('syncing','儲存中…');
  await cloudSet('calEvents', calEvents);
  setSyncStatus('ok','已同步 ✓');
}

// ─── MONTHLY EVENTS LIST ──────────────────────────────────────────────────────
function renderMonthlyEvents() {
  const todayStr = new Date().toISOString().split('T')[0];
  const MONTHS_ZH2 = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DOW_ZH = ['日','一','二','三','四','五','六'];
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const eventEmojis = ['🚒','🚓','🚑','📚','✏️','🎨','🏃','🍎','🌟','🎮'];

  // title
  const titleEl = document.getElementById('month-events-title');
  titleEl.textContent = `📋 ${MONTHS_ZH2[calMonth]} 記事`;

  const container = document.getElementById('month-events-list');
  let html = '';
  let hasAny = false;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const events  = calEvents[dateStr];
    if (!events || !events.length) continue;
    hasAny = true;

    const dow     = new Date(calYear, calMonth, d).getDay();
    const isToday = dateStr === todayStr;
    const isWkend = dow === 0 || dow === 6;
    const dayNumColor = isToday ? '#E53935' : (isWkend ? '#E53935' : 'var(--brown)');

    html += `<div class="month-event-group">
      <div class="month-event-day-header${isToday?' today-header':''}">
        <span class="month-event-day-num" style="color:${dayNumColor}">${d}</span>
        <span class="month-event-day-label">（${DOW_ZH[dow]}）${isToday?'  ← 今天':''}</span>
      </div>`;

    events.forEach((ev, i) => {
      html += `<div class="month-event-row">
        <div class="month-event-emoji">${eventEmojis[i % eventEmojis.length]}</div>
        <div class="month-event-text">${ev.text}</div>
        <button class="month-event-del" onclick="deleteEventFromList('${dateStr}','${ev.id}')">🗑️</button>
      </div>`;
    });
    html += `</div>`;
  }

  if (!hasAny) {
    html = '<div class="month-events-empty">🚒 這個月還沒有記事<br>點日期格子來新增吧！</div>';
  }
  container.innerHTML = html;
}

async function deleteEventFromList(dateStr, evId) {
  if (!confirm('確定要刪掉這筆記事嗎？')) return;
  calEvents[dateStr] = (calEvents[dateStr]||[]).filter(e=>e.id!==evId);
  if (!calEvents[dateStr].length) delete calEvents[dateStr];
  renderCal();
  await saveCalEvents();
  showToast('🗑️ 已刪除記事！');
}

document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
calInit();
loadAll();

// 每 30 秒自動重新整理（讓其他家人的更新能同步進來）
setInterval(loadAll, 30000);
</script>
